---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_installed

- name: Install k3s
  shell: curl -sfL https://get.k3s.io | sh -
  when: not k3s_installed.stat.exists

- name: Wait for k3s service to be registered
  wait_for:
    path: /etc/systemd/system/k3s.service
    state: present
    timeout: 60

- name: Enable and start k3s service
  systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for k3s to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    state: present
    timeout: 60

- name: Verify k3s node is ready
  shell: kubectl get nodes
  register: node_status
  retries: 5
  delay: 10
  until: "'Ready' in node_status.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Show node status
  debug:
    msg: "{{ node_status.stdout }}"

- name: Fetch kubeconfig
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./kubeconfig/k3s.yaml
    flat: true

# k3s가 생성하는 kubeconfig server IP는 127.0.0.1
# 로컬 kubectl 접속을 위해 실제 EC2 EIP로 치환
- name: Fix kubeconfig server IP (127.0.0.1 → 실제 EIP)
  replace:
    path: ./kubeconfig/k3s.yaml
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  delegate_to: localhost
