---
- name: Set Node Exporter version
  set_fact:
    node_exporter_version: "1.7.0"

- name: Check if Node Exporter is already installed
  stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_installed

- name: Download Node Exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
  when: not node_exporter_installed.stat.exists

- name: Extract Node Exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true
  when: not node_exporter_installed.stat.exists

- name: Move Node Exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  when: not node_exporter_installed.stat.exists

- name: Create node_exporter system user
  user:
    name: node_exporter
    shell: /bin/false
    system: true
    create_home: false

- name: Create Node Exporter systemd service
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter
      Restart=always

      [Install]
      WantedBy=multi-user.target
  notify: Restart node_exporter

- name: Reload systemd daemon
  systemd:
    daemon_reload: true

- name: Enable and start Node Exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started

- name: Verify Node Exporter is running on port 9100
  wait_for:
    port: 9100
    timeout: 30

- name: Show Node Exporter status
  debug:
    msg: "Node Exporter running on :9100"
