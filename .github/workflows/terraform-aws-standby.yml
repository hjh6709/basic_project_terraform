name: Terraform AWS Standby

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/environments/aws-standby/**'
      - 'terraform/modules/aws-network/**'
      - 'terraform/modules/aws-compute/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/environments/aws-standby/**'
      - 'terraform/modules/aws-network/**'
      - 'terraform/modules/aws-compute/**'

jobs:
  terraform:
    name: Terraform AWS Standby
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/aws-standby

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="my_ip=${{ secrets.MY_IP }}" -var="key_name=${{ secrets.KEY_NAME }}"

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="my_ip=${{ secrets.MY_IP }}" -var="key_name=${{ secrets.KEY_NAME }}"

      - name: Terraform Output Summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "## 🚀 Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 Elastic IP (승민님 전달) | $(terraform output -raw ec2_elastic_ip) |" >> $GITHUB_STEP_SUMMARY
          echo "| NAT Gateway IP (성호님 전달) | $(terraform output -raw nat_gateway_ip) |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance ID | $(terraform output -raw instance_id) |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH 접속 명령어 | \`$(terraform output -raw ssh_command)\` |" >> $GITHUB_STEP_SUMMARY