name: Terraform AWS Standby

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/environments/aws-standby/**'
      - 'terraform/modules/aws-network/**'
      - 'terraform/modules/aws-security/**'
      - 'terraform/modules/aws-compute/**'
      - 'terraform/modules/aws-bastion/**'
      - '.github/workflows/terraform-aws-standby.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/environments/aws-standby/**'
      - 'terraform/modules/aws-network/**'
      - 'terraform/modules/aws-security/**'
      - 'terraform/modules/aws-compute/**'
      - 'terraform/modules/aws-bastion/**'
      - '.github/workflows/terraform-aws-standby.yml'

jobs:
  terraform:
    name: Terraform AWS Standby
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/aws-standby

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="allowed_ssh_cidr=${{ secrets.MY_IP }}" \
            -var="key_name=${{ secrets.KEY_NAME }}"

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve \
            -var="allowed_ssh_cidr=${{ secrets.MY_IP }}" \
            -var="key_name=${{ secrets.KEY_NAME }}"

      - name: Terraform Output Summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| k3s 노드 EIP (승민님/성호님 전달) | $(terraform output -raw public_ip) |" >> $GITHUB_STEP_SUMMARY
          echo "| Bastion EIP | $(terraform output -raw bastion_public_ip) |" >> $GITHUB_STEP_SUMMARY
          echo "| Bastion SG ID (희정님 전달) | $(terraform output -raw bastion_sg_id) |" >> $GITHUB_STEP_SUMMARY
          echo "| k3s 노드 SSH | $(terraform output -raw ssh_command) |" >> $GITHUB_STEP_SUMMARY
          echo "| Bastion SSH | $(terraform output -raw bastion_ssh_command) |" >> $GITHUB_STEP_SUMMARY
