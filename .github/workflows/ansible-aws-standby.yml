name: Ansible AWS Standby Setup

on:
  workflow_run:
    workflows:
      - "Terraform AWS Standby"
    types:
      - completed
  workflow_dispatch:

jobs:
  ansible:
    name: Ansible Setup
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        working-directory: terraform/environments/aws-standby
        run: terraform init

      - name: Generate Ansible Inventory
        working-directory: terraform/environments/aws-standby
        run: |
          terraform apply -auto-approve \
            -var="my_ip=${{ secrets.MY_IP }}" \
            -var="key_name=${{ secrets.KEY_NAME }}"
          EC2_IP=$(terraform output -raw ec2_elastic_ip)
          mkdir -p ../../ansible/inventory
          echo "all:" > ../../ansible/inventory/hosts.yml
          echo "  children:" >> ../../ansible/inventory/hosts.yml
          echo "    aws_standby:" >> ../../ansible/inventory/hosts.yml
          echo "      hosts:" >> ../../ansible/inventory/hosts.yml
          echo "        k3s_node:" >> ../../ansible/inventory/hosts.yml
          echo "          ansible_host: $EC2_IP" >> ../../ansible/inventory/hosts.yml
          echo "          ansible_user: ubuntu" >> ../../ansible/inventory/hosts.yml
          echo "          ansible_ssh_private_key_file: ~/.ssh/chilseong-jh.pem" >> ../../ansible/inventory/hosts.yml
          echo "          ansible_ssh_common_args: '-o StrictHostKeyChecking=no'" >> ../../ansible/inventory/hosts.yml
          echo "=== 생성된 hosts.yml ==="
          cat ../../ansible/inventory/hosts.yml

      - name: Get GitHub Actions IP and Security Group ID
        working-directory: terraform/environments/aws-standby
        run: |
          ACTIONS_IP=$(curl -s https://api.ipify.org)/32
          echo "ACTIONS_IP=$ACTIONS_IP" >> $GITHUB_ENV
          echo "GitHub Actions IP: $ACTIONS_IP"
          SG_ID=$(terraform output -raw security_group_id)
          echo "SG_ID=$SG_ID" >> $GITHUB_ENV
          echo "Security Group ID: $SG_ID"

      - name: Add GitHub Actions IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ env.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ env.ACTIONS_IP }} \
            --region ap-northeast-2

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/chilseong-jh.pem
          chmod 600 ~/.ssh/chilseong-jh.pem

      - name: Wait for EC2 SSH
        working-directory: terraform/environments/aws-standby
        run: |
          EC2_IP=$(terraform output -raw ec2_elastic_ip)
          echo "Waiting for EC2 SSH..."
          for i in {1..20}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i ~/.ssh/chilseong-jh.pem ubuntu@$EC2_IP "echo ready"; then
              echo "EC2 is ready!"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 15
          done

      - name: Run Ansible Playbook
        working-directory: ansible
        run: ansible-playbook playbook.yml --private-key ~/.ssh/chilseong-jh.pem -i inventory/hosts.yml

      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: ansible/kubeconfig/k3s.yaml

      - name: Remove GitHub Actions IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ env.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ env.ACTIONS_IP }} \
            --region ap-northeast-2